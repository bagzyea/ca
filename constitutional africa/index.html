<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Constitutional Africa — Wireframes & Brand Direction</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Kalam:wght@400;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Serif:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; height:100%; background:#efece5; }
  body { font-family: "IBM Plex Sans", system-ui, sans-serif; color:#1a1612; }
  /* wireframe "paper" + ink palette */
  :root {
    --ink:#1a1612;
    --ink-soft:#5a544b;
    --ink-faint:#9a948a;
    --paper:#faf7f0;
    --paper-2:#f3efe6;
    --rule:#1a1612;
    --accent-green:#1f5a3d;
    --accent-gold:#c89b3c;
    --accent-terra:#b25a32;
    --accent-indigo:#1d2d5a;
  }
  /* core wireframe primitives */
  .wf { font-family:"IBM Plex Mono", ui-monospace, monospace; color:var(--ink); }
  .wf-paper { background:var(--paper); }
  .wf h1, .wf h2, .wf h3 { font-family:"Kalam", cursive; font-weight:700; margin:0; letter-spacing:-0.01em; }
  .wf-handwrite { font-family:"Caveat", cursive; }
  .wf-box { border:1.5px solid var(--ink); background:#fff; }
  .wf-box.dashed { border-style:dashed; }
  .wf-box.thick { border-width:2px; }
  .wf-img {
    background:
      repeating-linear-gradient(135deg, transparent 0 8px, rgba(26,22,18,0.07) 8px 9px),
      #fff;
    border:1.5px solid var(--ink);
    position:relative;
    display:flex; align-items:center; justify-content:center;
    font-family:"IBM Plex Mono", monospace; font-size:10px; color:var(--ink-soft);
    text-align:center;
    padding:8px;
  }
  .wf-img::before, .wf-img::after {
    content:""; position:absolute; inset:0;
    border-top:1.5px solid var(--ink); border-bottom:1.5px solid var(--ink);
    transform: scaleY(0);
  }
  .wf-img .x {
    position:absolute; inset:0;
    background:
      linear-gradient(to top right, transparent calc(50% - 1px), rgba(26,22,18,0.25) calc(50% - 1px), rgba(26,22,18,0.25) calc(50% + 1px), transparent calc(50% + 1px)),
      linear-gradient(to bottom right, transparent calc(50% - 1px), rgba(26,22,18,0.25) calc(50% - 1px), rgba(26,22,18,0.25) calc(50% + 1px), transparent calc(50% + 1px));
    pointer-events:none;
  }
  .wf-text-line {
    height:8px; background:repeating-linear-gradient(to right, #2a251f 0 60%, transparent 60% 100%);
    background-size: 14px 8px;
    border-radius:1px;
    opacity:0.85;
  }
  .wf-text-line.thin { height:5px; opacity:0.55; }
  .wf-text-line.short { width:55%; }
  .wf-text-line.tiny { width:32%; }
  .wf-pill {
    display:inline-flex; align-items:center; gap:6px;
    padding:4px 10px; border:1.25px solid var(--ink);
    border-radius:999px; font-family:"IBM Plex Mono",monospace; font-size:10px;
    background:#fff;
  }
  .wf-chip {
    display:inline-flex; align-items:center;
    padding:3px 7px; border:1.25px solid var(--ink);
    font-family:"IBM Plex Mono",monospace; font-size:9px; letter-spacing:0.04em;
    background:#fff;
  }
  .wf-btn {
    display:inline-flex; align-items:center; gap:6px;
    padding:7px 14px; border:1.5px solid var(--ink);
    font-family:"IBM Plex Mono",monospace; font-size:10px; font-weight:600;
    letter-spacing:0.06em; text-transform:uppercase; background:#fff;
  }
  .wf-btn.solid { background:var(--ink); color:#fff; }
  .wf-arrow::after { content:" →"; font-family:"IBM Plex Mono",monospace; }
  /* sketchy device frame */
  .wf-phone {
    border:2px solid var(--ink);
    border-radius:32px;
    padding:10px 8px;
    background:#fff;
    position:relative;
  }
  .wf-phone::before {
    content:""; position:absolute; top:14px; left:50%; transform:translateX(-50%);
    width:54px; height:8px; background:var(--ink); border-radius:4px;
  }
  .wf-note {
    font-family:"Caveat", cursive; font-size:18px; color:#7a6b4a;
    line-height:1.15;
  }
  .wf-callout {
    font-family:"Caveat", cursive; color:#b25a32;
    font-size:16px; line-height:1.1;
  }
  .wf-callout-arrow {
    font-family:"Caveat", cursive; color:#b25a32; font-size:22px; line-height:1;
  }
  /* underline-style label */
  .wf-label-u {
    display:inline-block; padding-bottom:2px;
    border-bottom:1.5px solid var(--ink);
    font-family:"IBM Plex Mono",monospace; font-size:10px;
    text-transform:uppercase; letter-spacing:0.08em;
  }

  /* hide the DC zoom controls? we'll keep them */

  /* DC overrides for paper aesthetic */
  #design-canvas-root { background: #efece5 !important; }
</style>
</head>
<body>
<div id="design-canvas-root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="wf-primitives.jsx"></script>
<script type="text/babel" src="brand-explorations.jsx"></script>
<script type="text/babel" src="page-wireframes.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
