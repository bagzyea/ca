<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Constitutional Africa — Pre-Build Planning</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; height:100%; background:#0E1320; }
  body { font-family: "IBM Plex Sans", system-ui, sans-serif; color:#F6F1E4; }

  :root {
    --ca-indigo-900:#0A1330;
    --ca-indigo-800:#0F1B3D;
    --ca-indigo-700:#16264D;
    --ca-indigo-600:#1E325C;
    --ca-indigo-500:#2F4878;
    --ca-indigo-300:#7E8FB4;
    --ca-indigo-100:#D8DDEC;

    --ca-brass-700:#8E6B26;
    --ca-brass-600:#A47E2E;
    --ca-brass-500:#B38A3A;
    --ca-brass-400:#C6A050;
    --ca-brass-300:#D6BC78;

    --ca-jade-700:#2E5E48;
    --ca-jade-600:#3E7A5E;
    --ca-jade-400:#69A185;

    --ca-terra-600:#A65238;
    --ca-terra-500:#B96846;

    --ca-ivory:#F6F1E4;
    --ca-ivory-2:#EFE8D4;
    --ca-paper:#FBF7EC;
    --ca-paper-2:#F1ECDE;

    --ca-obsidian:#0E1320;
    --ca-ink:#1B2030;
    --ca-ink-soft:#4A506A;
    --ca-ink-faint:#8B91A8;

    --ca-rule:rgba(14,19,32,0.14);
    --ca-rule-on-dark:rgba(246,241,228,0.18);

    --ca-ok:#3E7A5E;
    --ca-warn:#B38A3A;
    --ca-bad:#A65238;
  }

  .ca-mono { font-family:"IBM Plex Mono", monospace; letter-spacing:0.06em; }
  .ca-serif { font-family:"IBM Plex Serif", serif; }
  .ca-sans  { font-family:"IBM Plex Sans", system-ui, sans-serif; }

  .ca-eyebrow {
    font-family:"IBM Plex Mono", monospace;
    font-size:11px; letter-spacing:0.22em; text-transform:uppercase;
  }
  .ca-rule { height:1px; background:var(--ca-rule); border:0; }
  .ca-rule.dark { background:var(--ca-rule-on-dark); }

  .ca-pill {
    display:inline-flex; align-items:center; gap:6px;
    padding:5px 10px; border-radius:999px;
    border:1px solid currentColor;
    font-family:"IBM Plex Mono", monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase;
  }
  .ca-chip {
    display:inline-flex; align-items:center;
    padding:4px 9px;
    font-family:"IBM Plex Mono", monospace; font-size:10px; letter-spacing:0.16em; text-transform:uppercase;
  }
  .ca-btn {
    display:inline-flex; align-items:center; gap:10px;
    padding:13px 20px;
    font-family:"IBM Plex Sans", sans-serif; font-weight:500; font-size:13px;
    letter-spacing:0.04em;
    border:1.5px solid currentColor;
    background:transparent;
  }
  .ca-btn.solid {
    background:var(--ca-indigo-700); color:var(--ca-ivory); border-color:var(--ca-indigo-700);
  }
  .ca-btn.brass {
    background:var(--ca-brass-500); color:var(--ca-obsidian); border-color:var(--ca-brass-500);
  }

  /* placeholder texture for stress-test imagery */
  .pb-img {
    position:relative; overflow:hidden;
    background:
      repeating-linear-gradient(135deg, transparent 0 22px, rgba(255,255,255,0.04) 22px 23px),
      radial-gradient(120% 80% at 30% 20%, #2F4878 0%, #16264D 55%, #0F1B3D 100%);
    color:#F6F1E4;
    display:flex; align-items:flex-end; padding:14px;
  }
  .pb-img.warm { background:
      repeating-linear-gradient(135deg, transparent 0 22px, rgba(255,255,255,0.04) 22px 23px),
      radial-gradient(120% 80% at 70% 30%, #C6A050 0%, #8E6B26 45%, #1E325C 100%); }
  .pb-img.jade { background:
      repeating-linear-gradient(135deg, transparent 0 22px, rgba(255,255,255,0.04) 22px 23px),
      radial-gradient(110% 80% at 30% 80%, #69A185 0%, #2E5E48 50%, #16264D 100%); }
  .pb-img.terra { background:
      repeating-linear-gradient(135deg, transparent 0 22px, rgba(255,255,255,0.04) 22px 23px),
      radial-gradient(120% 80% at 40% 60%, #B96846 0%, #A65238 50%, #1B2030 100%); }
  .pb-img-label {
    font-family:"IBM Plex Mono", monospace; font-size:10px; letter-spacing:0.16em;
    color: rgba(246,241,228,0.85); text-transform:uppercase;
  }

  /* tables */
  .pb-table { width:100%; border-collapse:collapse; font-family:"IBM Plex Sans"; font-size:12.5px; color:var(--ca-ink); }
  .pb-table th { font-family:"IBM Plex Mono", monospace; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; text-align:left; padding:10px 12px; background:var(--ca-paper-2); color:var(--ca-ink-soft); border-bottom:1px solid var(--ca-rule); }
  .pb-table td { padding:10px 12px; border-bottom:1px solid var(--ca-rule); vertical-align:top; }
  .pb-table tr:last-child td { border-bottom:0; }
  .pb-table code { font-family:"IBM Plex Mono"; font-size:11px; color:var(--ca-indigo-700); background:rgba(22,38,77,0.06); padding:1px 5px; border-radius:2px; }

  /* status dots */
  .pb-dot { display:inline-block; width:8px; height:8px; border-radius:50%; vertical-align:middle; margin-right:6px; }
  .pb-dot.ok { background:var(--ca-ok); }
  .pb-dot.warn { background:var(--ca-warn); }
  .pb-dot.bad { background:var(--ca-bad); }

  /* canvas root */
  #design-canvas-root { background:#0E1320 !important; }
</style>
</head>
<body>
<div id="design-canvas-root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="hifi-meridian.jsx"></script>
<script type="text/babel" src="prebuild-ia.jsx"></script>
<script type="text/babel" src="prebuild-content.jsx"></script>
<script type="text/babel" src="prebuild-components.jsx"></script>
<script type="text/babel" src="prebuild-stress.jsx"></script>
<script type="text/babel" src="prebuild-a11y.jsx"></script>
<script type="text/babel" src="prebuild-app.jsx"></script>
</body>
</html>
